<title>くらしサポート</title>
<style>
:root{
  --bg:#f0ece3; --bg2:#faf8f4; --card:#ffffff; --card2:#f6f3ec;
  --navy:#1c2a48; --navy2:#283a5e; --ink:#1c2a48; --ink-dim:#6a7286; --ink-faint:#a09a8c;
  --line:#e8e2d6; --line2:#f0ebe0;
  --accent:#1c2a48; --accent2:#2f4470; --accent-soft:#eaeef6;
  --gold:#b8943f; --gold-soft:#f5edd8;
  --green:#2f8f5b; --green-soft:#e6f2ea; --green-deep:#237a4a;
  --red:#c0492f; --red-soft:#f7e8e2; --red-deep:#a83d27;
  --amber:#c8912f; --amber-soft:#f6ecd6; --amber-deep:#a8791f;
  --purple:#5b4b8a; --cyan:#3a7d8c;
  --shadow-sm:0 1px 3px rgba(40,45,70,.06),0 4px 12px rgba(40,45,70,.05);
  --shadow:0 2px 6px rgba(40,45,70,.05),0 10px 28px rgba(40,45,70,.10),0 4px 10px rgba(40,45,70,.04);
  --shadow-lg:0 4px 12px rgba(40,45,70,.08),0 20px 50px rgba(40,45,70,.18);
  --r:22px; --r-sm:15px;
  --serif:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:linear-gradient(180deg,#f3efe7 0%,#ece7dc 100%);background-attachment:fixed;color:var(--ink);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6;}
body{padding-bottom:env(safe-area-inset-bottom);}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
header{padding:calc(env(safe-area-inset-top) + 18px) 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 70%,rgba(244,246,251,0));}
.brand{display:flex;align-items:center;gap:10px;}
.brand .logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--navy),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(61,90,254,.35);}
.brand .logo svg{width:19px;height:19px;stroke:#fff;}
.brand h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.01em;color:var(--navy);}
.gearbtn{width:40px;height:40px;border-radius:12px;border:none;background:var(--bg2);color:var(--ink-dim);font-size:18px;cursor:pointer;box-shadow:var(--shadow-sm);}
.gearbtn:active{transform:scale(.95);}
main{flex:1;padding:6px 16px 96px;}
.view{display:none;animation:fade .3s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.9);position:relative;}
.card h2{font-size:12px;margin:0 0 14px;color:var(--ink-dim);letter-spacing:.06em;font-weight:800;text-transform:uppercase;}
.card h2 .sub{color:var(--ink-faint);font-weight:600;letter-spacing:0;font-size:11.5px;margin-left:6px;text-transform:none;}
/* 月ヘッダ */
.monthbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px;}
.monthbar .mv{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.01em;}
.mnav{width:38px;height:38px;border-radius:12px;border:none;background:var(--bg2);color:var(--navy);font-size:19px;cursor:pointer;box-shadow:var(--shadow-sm);}
.mnav:active{transform:scale(.95);}
/* 月サマリー */
.msum{background:linear-gradient(140deg,#22314f 0%,#1a2740 55%,#151f36 100%);border-radius:var(--r);padding:22px 22px 18px;margin-bottom:14px;box-shadow:0 6px 14px rgba(28,42,72,.2),0 18px 44px rgba(28,42,72,.34);position:relative;overflow:hidden;}
.msum::before{content:"";position:absolute;right:-40px;top:-50px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,rgba(184,148,63,.18),transparent 70%);}
.msum::after{content:"";position:absolute;right:14px;top:16px;font-size:11px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.05em;}
.msum .mlab{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.04em;z-index:1;position:relative;}
.msum .mbig{font-family:var(--serif);font-size:38px;font-weight:700;letter-spacing:-.01em;margin:4px 0 2px;z-index:1;position:relative;line-height:1.1;}
.msum .mbig .yen{font-size:21px;opacity:.6;margin-right:3px;}
.msum .mbig.plus{color:#7fe6a8;} .msum .mbig.minus{color:#ff9aa8;}

nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);

<script>
const DB_NAME='asobiKurashi',STORE='state',KEY='main';
const CATICONS={"食費": {"c": "#ff7a1a", "p": "<path d=\"M4 3v7a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V3M6 3v18M18 3c-1.5 0-3 1.5-3 5s1.5 4 3 4v9\"/>"}, "外食": {"c": "#ff5a5f", "p": "<path d=\"M12 3a6 6 0 0 0-6 6c0 2 1 3 2 3.5V21h8v-8.5c1-.5 2-1.5 2-3.5a6 6 0 0 0-6-6z\"/>"}, "日用品": {"c": "#16c060", "p": "<path d=\"M6 8h12l-1 12H7L6 8zM9 8V6a3 3 0 0 1 6 0v2\"/>"}, "交通費": {"c": "#8b6f47", "p": "<rect x=\"6\" y=\"4\" width=\"12\" height=\"13\" rx=\"2\"/><path d=\"M6 11h12M9 17l-2 3M15 17l2 3\"/><circle cx=\"9\" cy=\"14\" r=\".6\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"15\" cy=\"14\" r=\".6\" fill=\"currentColor\" stroke=\"none\"/>"}, "趣味・娯楽": {"c": "#7c4dff", "p": "<path d=\"M8 6h8a4 4 0 0 1 4 4v.5a3.5 3.5 0 0 1-6.3 2.1L13 12h-2l-.7.6A3.5 3.5 0 0 1 4 10.5V10a4 4 0 0 1 4-4z\"/><circle cx=\"8.5\" cy=\"10\" r=\".8\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"15.5\" cy=\"10\" r=\".8\" fill=\"currentColor\" stroke=\"none\"/>"}, "交際費": {"c": "#ffab00", "p": "<path d=\"M7 10l-1 6a2 2 0 0 0 2 2h1M17 10l1 6a2 2 0 0 1-2 2h-1M7 10l2-5M17 10l-2-5M9 5h6M7 10h10M10 18v2M14 18v2\"/>"}, "衣服・美容": {"c": "#3d5afe", "p": "<path d=\"M8 4l4 3 4-3 3 3-3 3v10H8V10L5 7z\"/>"}, "医療": {"c": "#00c2a8", "p": "<rect x=\"4\" y=\"8\" width=\"16\" height=\"10\" rx=\"2\"/><path d=\"M9 8V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M12 11v4M10 13h4\"/>"}, "電気": {"c": "#ffc400", "p": "<path d=\"M13 2L5 13h5l-1 9 8-11h-5l1-9z\"/>"}, "ガス": {"c": "#ff6d00", "p": "<path d=\"M12 3c3 3 5 6 5 9a5 5 0 0 1-10 0c0-1 .5-2 1-3 .5 1 1.5 1.5 2 1.5C9 8 11 5 12 3z\"/>"}, "水道": {"c": "#00b8d4", "p": "<path d=\"M6 5h6v4M12 7h4a2 2 0 0 1 2 2M9 9c0 4-3 4-3 7a3 3 0 0 0 6 0c0-3-3-3-3-7z\"/>"}, "住居": {"c": "#5b73ff", "p": "<path d=\"M4 11l8-7 8 7M6 9.5V20h12V9.5M10 20v-5h4v5\"/>"}, "通信": {"c": "#00c853", "p": "<rect x=\"7\" y=\"3\" width=\"10\" height=\"18\" rx=\"2.5\"/><path d=\"M11 18h2\"/>"}, "その他": {"c": "#94a3b8", "p": "<circle cx=\"12\" cy=\"12\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"6\" cy=\"12\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/><circle cx=\"18\" cy=\"12\" r=\"1.3\" fill=\"currentColor\" stroke=\"none\"/>"}, "給与": {"c": "#00c853", "p": "<rect x=\"3\" y=\"6\" width=\"18\" height=\"12\" rx=\"2\"/><circle cx=\"12\" cy=\"12\" r=\"2.5\"/><path d=\"M7 9v6M17 9v6\"/>"}, "賞与": {"c": "#ffab00", "p": "<path d=\"M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.5 7.1 18.2 8 12.7l-4-3.9L9.5 8z\"/>"}, "臨時": {"c": "#7c4dff", "p": "<circle cx=\"12\" cy=\"12\" r=\"8\"/><path d=\"M12 8v8M9.5 10a2.5 2 0 0 1 5 0c0 2-5 1-5 3a2.5 2 0 0 0 5 0\"/>"}};
const EXP_CATS=['食費','外食','日用品','交通費','趣味・娯楽','交際費','衣服・美容','医療','電気','ガス','水道','住居','通信','その他'];
const INC_CATS=['給与','賞与','臨時','その他'];
const pad2=n=>String(n).padStart(2,'0');
const YEN=n=>'¥'+Math.round(n).toLocaleString('ja-JP');
const NUM=n=>Math.round(n).toLocaleString('ja-JP');
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;};
const todayMonth=()=>todayStr().slice(0,7);
const MLABEL=m=>{const[y,mo]=m.split('-');return `${y}年${parseInt(mo)}月`;};
const addMonth=(m,d)=>{let[y,mo]=m.split('-').map(Number);mo+=d;while(mo<1){mo+=12;y--;}while(mo>12){mo-=12;y++;}return `${y}-${pad2(mo)}`;};
const daysInMonth=m=>{const[y,mo]=m.split('-').map(Number);return new Date(y,mo,0).getDate();};
const firstDow=m=>{const[y,mo]=m.split('-').map(Number);return new Date(y,mo-1,1).getDay();};
const uid=()=>Math.random().toString(36).slice(2,10);
function rand(a){return a[Math.floor(Math.random()*a.length)];}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const catColor=n=>(CATICONS[n]&&CATICONS[n].c)||'#94a3b8';
function catSvg(n,size){const d=CATICONS[n];const p=d?d.p:CATICONS['その他'].p;const col=d?d.c:'#94a3b8';return `<svg viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:${size||24}px;height:${size||24}px">${p}</svg>`;}

let db,state,curMonth=todayMonth(),selDate=todayStr();

function seed(){return{tx:{},plans:[],todos:[],accounts:[],friends:[]};}
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);r.onsuccess=e=>{db=e.target.result;res();};r.onerror=rej;});}
function load(){return new Promise(res=>{try{const t=db.transaction(STORE,'readonly').objectStore(STORE).get(KEY);t.onsuccess=()=>res(t.result||null);t.onerror=()=>res(null);}catch(e){res(null);}});}
function save(){try{db.transaction(STORE,'readwrite').objectStore(STORE).put(state,KEY);}catch(e){toast('保存に失敗');}}

// 取引: state.tx[YYYY-MM] = [{id,type:'in'|'out',amount,cat,memo,date}]
function monthTx(m){return state.tx[m]||[];}
function dayTx(dateStr){const m=dateStr.slice(0,7);return monthTx(m).filter(t=>t.date===dateStr);}
function monthSum(m){let inc=0,out=0;monthTx(m).forEach(t=>{if(t.type==='in')inc+=+t.amount||0;else out+=+t.amount||0;});return{inc,out,net:inc-out};}
function daySum(dateStr){let inc=0,out=0;dayTx(dateStr).forEach(t=>{if(t.type==='in')inc+=+t.amount||0;else out+=+t.amount||0;});return{inc,out,net:inc-out};}
function addTx(t){const m=t.date.slice(0,7);if(!state.tx[m])state.tx[m]=[];state.tx[m].push(t);save();}
function updateTx(t){const m=t.date.slice(0,7);// 日付が変わった場合は全月から除去して入れ直し
  removeTx(t.id);if(!state.tx[m])state.tx[m]=[];state.tx[m].push(t);save();}
function removeTx(id){Object.keys(state.tx).forEach(m=>{state.tx[m]=state.tx[m].filter(t=>t.id!==id);if(!state.tx[m].length)delete state.tx[m];});}

function haptic(){if(navigator.vibrate)navigator.vibrate(8);}
let tT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2000);}
function countUp(el,to,fmt){const dur=600,t0=performance.now();function step(t){const p=Math.min(1,(t-t0)/dur);const e=1-Math.pow(1-p,3);el.innerHTML=fmt(to*e);if(p<1)requestAnimationFrame(step);}requestAnimationFrame(step);}

/* 計算機の式評価 */
function evalAmount(str){if(str==null)return 0;let s=String(str).trim();if(s==='')return 0;
  s=s.replace(/[０-９]/g,d=>'0123456789'['０１２３４５６７８９'.indexOf(d)]).replace(/[＋]/g,'+').replace(/[－ー−]/g,'-').replace(/[×*✕]/g,'*').replace(/[÷／]/g,'/').replace(/[（]/g,'(').replace(/[）]/g,')').replace(/[，,、]/g,'').replace(/[¥￥\s]/g,'');
  if(/^-?\d+(\.\d+)?$/.test(s))return Math.round(parseFloat(s));
  if(!/^[0-9+\-*/().]+$/.test(s))return NaN;
  try{let i=0;
    function num(){let j=i;if(s[i]==='-'||s[i]==='+')i++;while(i<s.length&&/[0-9.]/.test(s[i]))i++;return parseFloat(s.slice(j,i));}
    function factor(){if(s[i]==='('){i++;let v=expr();if(s[i]===')')i++;return v;}return num();}
    function term(){let v=factor();while(s[i]==='*'||s[i]==='/'){const op=s[i++];const r=factor();v=op==='*'?v*r:v/r;}return v;}
    function expr(){let v=term();while(s[i]==='+'||s[i]==='-'){const op=s[i++];const r=term();v=op==='+'?v+r:v-r;}return v;}
    const r=expr();if(i!==s.length||isNaN(r)||!isFinite(r))return NaN;return Math.round(r);
  }catch(e){return NaN;}}

/* ===== 集計タブ ===== */
let skMonth=null;
function renderShukei(){
  if(!skMonth)skMonth=curMonth;
  document.getElementById('skMonthLabel').textContent=MLABEL(skMonth);
  // カテゴリ別支出
  const txs=monthTx(skMonth);
  const exp={},inc={};
  txs.forEach(t=>{if(t.type==='out')exp[t.cat]=(exp[t.cat]||0)+(+t.amount||0);else inc[t.cat]=(inc[t.cat]||0)+(+t.amount||0);});
  const expTotal=Object.values(exp).reduce((a,b)=>a+b,0);
  const incTotal=Object.values(inc).reduce((a,b)=>a+b,0);
  // 支出内訳（棒付き）
  const cb=document.getElementById('catBreakdown');cb.innerHTML='';
  const expEntries=Object.entries(exp).sort((a,b)=>b[1]-a[1]);
  if(!expEntries.length){cb.innerHTML='<div class="empty">この月の支出はまだありません</div>';}
  else{expEntries.forEach(([cat,amt])=>{const pct=expTotal>0?Math.round(amt/expTotal*100):0;const col=catColor(cat);
    const row=document.createElement('div');row.className='bkrow';
    row.innerHTML=`<div class="bkic" style="background:${col}1a">${catSvg(cat,20)}</div>
      <div class="bkmid"><div class="bktop"><span class="bkname">${esc(cat)}</span><span class="bkamt">${YEN(amt)}</span></div>
      <div class="bkbar"><i style="width:0%;background:${col}"></i></div></div>
      <div class="bkpct">${pct}%</div>`;
    cb.appendChild(row);setTimeout(()=>{row.querySelector('.bkbar>i').style.width=pct+'%';},50);});
    const tot=document.createElement('div');tot.className='bktotal';tot.innerHTML=`<span>支出合計</span><span>${YEN(expTotal)}</span>`;cb.appendChild(tot);}
  // 収入内訳
  const ib=document.getElementById('incBreakdown');ib.innerHTML='';
  const incEntries=Object.entries(inc).sort((a,b)=>b[1]-a[1]);
  if(!incEntries.length){ib.innerHTML='<div class="empty">この月の収入はまだありません</div>';}
  else{incEntries.forEach(([cat,amt])=>{const col=catColor(cat);const row=document.createElement('div');row.className='bkrow';
    row.innerHTML=`<div class="bkic" style="background:${col}1a">${catSvg(cat,20)}</div><div class="bkmid"><div class="bktop"><span class="bkname">${esc(cat)}</span><span class="bkamt" style="color:var(--green-deep)">+${NUM(amt)}</span></div></div>`;
    ib.appendChild(row);});
    const tot=document.createElement('div');tot.className='bktotal';tot.innerHTML=`<span>収入合計</span><span style="color:var(--green-deep)">${YEN(incTotal)}</span>`;ib.appendChild(tot);}
  // 遊び回数（完了した予定をその月でカウント）
  const ac=document.getElementById('asobiCount');
  const doneThis=(state.plans||[]).filter(p=>p.done&&p.date&&p.date.slice(0,7)===skMonth);
  const cost=doneThis.reduce((s,p)=>s+(+p.cost||0),0);
  ac.innerHTML=`<div class="acbig"><span class="acn">${doneThis.length}</span><span class="acu">回</span></div>
    <div class="acsub">${doneThis.length?`使った金額の目安 <b>${YEN(cost)}</b>`:'この月はまだ記録がありません'}</div>`;
  if(doneThis.length){const list=document.createElement('div');list.style.marginTop='14px';
    doneThis.sort((a,b)=>a.date<b.date?-1:1).forEach(p=>{const dd=new Date(p.date+'T12:00:00');const r=document.createElement('div');r.className='acitem';
      r.innerHTML=`<span class="acd">${dd.getMonth()+1}/${dd.getDate()}</span><span class="act">${esc(p.title||'遊び')}</span><span class="acv">${YEN(p.cost||0)}</span>`;list.appendChild(r);});
    ac.appendChild(list);}
}

/* ===== 収支タブ ===== */
function renderShuushi(){
  document.getElementById('monthLabel').textContent=MLABEL(curMonth);
  const s=monthSum(curMonth);
  const mlab=document.querySelector('.msum .mlab');if(mlab)mlab.textContent=MLABEL(curMonth)+' の 差引';
  document.getElementById('sumIn').innerHTML='<span class="yen">¥</span>'+NUM(s.inc);
  document.getElementById('sumOut').innerHTML='<span class="yen">¥</span>'+NUM(s.out);
  const net=document.getElementById('sumNet');
  net.className='mbig '+(s.net<0?'minus':'plus');
  net.innerHTML='<span class="yen">¥</span>'+(s.net<0?'-':(s.net>0?'+':''))+NUM(Math.abs(s.net));
  renderCal();renderDay();
}
function renderCal(){
  const host=document.getElementById('calGrid');const dim=daysInMonth(curMonth),fd=firstDow(curMonth);
  let html='';['日','月','火','水','木','金','土'].forEach(w=>html+=`<div class="wd">${w}</div>`);
  for(let i=0;i<fd;i++)html+='<div class="cell empty"></div>';
  const tstr=todayStr();
  for(let d=1;d<=dim;d++){const ds=`${curMonth}-${pad2(d)}`;const dow=(fd+d-1)%7;const ds2=daySum(ds);
    const cls=['cell'];if(dow===0)cls.push('sun');if(dow===6)cls.push('sat');if(ds===tstr)cls.push('today');if(ds===selDate)cls.push('sel');
    let mk='';if(ds2.inc>0)mk+='<i class="in"></i>';if(ds2.out>0)mk+='<i class="out"></i>';
    html+=`<div class="${cls.join(' ')}" data-d="${ds}">${d}<div class="mk">${mk}</div></div>`;}
  host.innerHTML=html;
  host.querySelectorAll('.cell[data-d]').forEach(c=>c.onclick=()=>{selDate=c.dataset.d;haptic();renderCal();renderDay();});
}
function renderDay(){
  const dd=new Date(selDate+'T12:00:00');const wd=['日','月','火','水','木','金','土'][dd.getDay()];
  document.getElementById('dayLabel').textContent=`${dd.getMonth()+1}月${dd.getDate()}日(${wd})`;
  const s=daySum(selDate);const dn=document.getElementById('dayNet');
  if(s.inc||s.out){dn.innerHTML=(s.inc?`<span style="color:var(--green-deep)">+${NUM(s.inc)}</span>`:'')+(s.inc&&s.out?' / ':'')+(s.out?`<span style="color:var(--red)">-${NUM(s.out)}</span>`:'');}else dn.textContent='';
  const host=document.getElementById('dayList');const txs=dayTx(selDate);
  if(!txs.length){host.innerHTML='<div class="empty">この日の記録はまだありません<br>右下の＋から追加できます</div>';return;}
  host.innerHTML='';
  txs.slice().sort((a,b)=>a.type===b.type?0:a.type==='in'?-1:1).forEach(t=>{
    const isIn=t.type==='in';const col=catColor(t.cat);
    const row=document.createElement('div');row.className='txrow';
    row.innerHTML=`<div class="txic" style="background:${col}1a">${catSvg(t.cat,22)}</div>
      <div class="nm">${esc(t.memo||t.cat)}<small>${esc(t.cat)}</small></div>
      <div class="amt ${isIn?'in':'out'}">${isIn?'+':'-'}${YEN(t.amount)}</div>`;
    row.onclick=()=>openTx(t);host.appendChild(row);});
}

/* ===== モーダル基盤 ===== */
const modal=document.getElementById('modal'),sheet=document.getElementById('sheet');
function closeModal(){modal.classList.remove('open');}
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
function openSheet(html){sheet.innerHTML='<div class="grip"></div>'+html;modal.classList.add('open');}
const val=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};

/* ===== 取引入力（電卓UI） ===== */
let calcBuf='';   // 入力中の式
let txDraft=null; // {id,type,amount,cat,memo,date}
function openTx(item){
  const isNew=!item;
  txDraft=item?{...item}:{id:uid(),type:'out',amount:0,cat:'食費',memo:'',date:selDate};
  if(isNew)txDraft.date=selDate;
  calcBuf=item?String(item.amount):'';
  drawTxSheet(isNew);
}
function drawTxSheet(isNew){
  const t=txDraft;const cats=t.type==='in'?INC_CATS:EXP_CATS;
  if(!cats.includes(t.cat))t.cat=cats[0];
  const dd=new Date(t.date+'T12:00:00');const wd=['日','月','火','水','木','金','土'][dd.getDay()];
  let tiles='';cats.forEach(c=>{tiles+=`<div class="cattile ${t.cat===c?'on':''}" data-cat="${esc(c)}"><div class="ci">${catSvg(c,26)}</div><div class="cn">${esc(c)}</div></div>`;});
  const disp=calcDisplay();
  openSheet(`
    <div class="segbig">
      <button class="${t.type==='out'?'on exp':''}" data-type="out">支出</button>
      <button class="${t.type==='in'?'on inc':''}" data-type="in">収入</button>
    </div>
    <div class="datepick"><button id="dPrev">‹</button><span class="dv" id="dVal">${dd.getFullYear()}年${dd.getMonth()+1}月${dd.getDate()}日(${wd})</span><button id="dNext">›</button></div>
    <div class="field" style="margin-bottom:12px;"><input id="tx_memo" placeholder="メモ（任意）" value="${esc(t.memo||'')}"></div>
    <div class="amtdisp"><span class="yen">¥</span><span class="n ${disp.ph?'ph':''}" id="amtN">${disp.text}</span></div>
    <div class="calceq" id="calcEq"></div>
    <div class="cattiles">${tiles}</div>
    <div class="calcpad">
      <div class="calctax"><button data-tax="1.08">税込8%</button><button data-tax="1.1">税込10%</button></div>
      <div class="calcgrid">
        <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button class="op" data-k="/">÷</button>
        <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button class="op" data-k="*">×</button>
        <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button class="op" data-k="-">−</button>
        <button class="fn" data-k="AC">AC</button><button data-k="0">0</button><button data-k="00">00</button><button class="op" data-k="+">＋</button>
      </div>
      <div class="calcgrid" style="margin-top:8px;">
        <button class="fn" data-k="DEL" style="grid-column:span 3;">⌫ 一文字消す</button>
        <button class="ok" id="txOK" style="grid-row:span 1;">${isNew?'追加':'保存'}</button>
      </div>
      ${isNew?'':'<button class="btn danger" id="txDel" style="margin-top:12px;">この記録を削除</button>'}
    </div>
  `);
  // type切替
  sheet.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{txDraft.type=b.dataset.type;const cs=txDraft.type==='in'?INC_CATS:EXP_CATS;if(!cs.includes(txDraft.cat))txDraft.cat=cs[0];haptic();drawTxSheet(isNew);});
  // 日付
  document.getElementById('dPrev').onclick=()=>{shiftDraftDate(-1);drawTxSheet(isNew);};
  document.getElementById('dNext').onclick=()=>{shiftDraftDate(1);drawTxSheet(isNew);};
  // カテゴリ
  sheet.querySelectorAll('[data-cat]').forEach(el=>el.onclick=()=>{txDraft.cat=el.dataset.cat;haptic();sheet.querySelectorAll('.cattile').forEach(x=>x.classList.toggle('on',x===el));});
  // 電卓
  sheet.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>calcKey(b.dataset.k));
  sheet.querySelectorAll('[data-tax]').forEach(b=>b.onclick=()=>applyTax(+b.dataset.tax));
  document.getElementById('tx_memo').oninput=e=>{txDraft.memo=e.target.value;};
  document.getElementById('txOK').onclick=commitTx;
  const del=document.getElementById('txDel');if(del)del.onclick=()=>{removeTx(txDraft.id);save();haptic();closeModal();renderShuushi();toast('削除しました');};
  updateCalcEq();
}
function shiftDraftDate(d){const dt=new Date(txDraft.date+'T12:00:00');dt.setDate(dt.getDate()+d);txDraft.date=`${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;haptic();}
function calcDisplay(){if(calcBuf==='')return{text:'0',ph:true};const v=evalAmount(calcBuf);if(!isNaN(v)&&!/[+\-*/]$/.test(calcBuf)&&!/[+\-*/]/.test(calcBuf))return{text:NUM(v),ph:false};return{text:esc(calcBuf.replace(/\*/g,'×').replace(/\//g,'÷')),ph:false};}
function updateAmtDisp(){const d=calcDisplay();const el=document.getElementById('amtN');if(el){el.textContent=d.text;el.classList.toggle('ph',d.ph);}}
function updateCalcEq(){const eq=document.getElementById('calcEq');if(!eq)return;if(/[+\-*/]/.test(calcBuf)){const v=evalAmount(calcBuf);eq.innerHTML=isNaN(v)?'':'= <b>'+YEN(v)+'</b>';}else eq.innerHTML='';}
function calcKey(k){
  if(k==='AC')calcBuf='';
  else if(k==='DEL')calcBuf=calcBuf.slice(0,-1);
  else if(/[+\-*/]/.test(k)){if(calcBuf===''&&k!=='-')return;if(/[+\-*/]$/.test(calcBuf))calcBuf=calcBuf.slice(0,-1)+k;else calcBuf+=k;}
  else calcBuf+=k;
  haptic();updateAmtDisp();updateCalcEq();
}
function applyTax(rate){const v=evalAmount(calcBuf);if(isNaN(v)||v<=0){toast('先に金額を入れてね');return;}calcBuf=String(Math.round(v*rate));haptic();updateAmtDisp();updateCalcEq();toast('税込'+(rate===1.08?'8%':'10%')+'で計算');}
function commitTx(){
  const amt=evalAmount(calcBuf);
  if(isNaN(amt)||amt<=0){toast('金額を確認してね');return;}
  txDraft.amount=amt;
  const exists=Object.values(state.tx).some(arr=>arr.some(x=>x.id===txDraft.id));
  if(exists)updateTx(txDraft);else addTx(txDraft);
  selDate=txDraft.date;curMonth=txDraft.date.slice(0,7);
  haptic();closeModal();renderShuushi();toast('記録しました');
}

/* ===== 遊びの予定 ===== */
/* ===== フレンド ===== */
function friendById(id){return (state.friends||[]).find(f=>f.id===id);}
function friendAvatar(f,size){const s=size||44;if(f&&f.img)return `<div class="favatar" style="width:${s}px;height:${s}px"><img src="${f.img}"></div>`;
  const nm=f?(f.name||'?').slice(0,1):'?';const col=f&&f.color?f.color:'#5b4b8a';
  return `<div class="favatar" style="width:${s}px;height:${s}px;background:${col};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${s*0.42}px">${esc(nm)}</div>`;}
function renderFriendStrip(){
  const host=document.getElementById('friendStrip');if(!host)return;host.innerHTML='';
  (state.friends||[]).forEach(f=>{const el=document.createElement('div');el.className='fchip';
    el.innerHTML=`${friendAvatar(f,52)}<div class="fnm">${esc(f.name)}</div>`;el.onclick=()=>openFriend(f);host.appendChild(el);});
  const add=document.createElement('div');add.className='fchip fadd';
  add.innerHTML=`<div class="favatar addav" style="width:52px;height:52px">＋</div><div class="fnm">追加</div>`;
  add.onclick=()=>openFriend();host.appendChild(add);
}
function openFriend(item){
  const isNew=!item;const f=item?{...item}:{id:uid(),name:'',img:'',color:rand(['#5b4b8a','#2f8f5b','#c0492f','#3a7d8c','#b8943f','#283a5e'])};
  openSheet(`<h3>${isNew?'遊ぶ人を追加':'プロフィール'}</h3>
    <div style="display:flex;justify-content:center;margin-bottom:18px;"><div id="fAvatarPrev">${friendAvatar(f,96)}</div></div>
    <button class="btn ghost" id="fPickImg" style="margin-bottom:14px;">📷 写真を選ぶ</button>
    <div class="field"><label>名前・呼び名</label><input id="f_name" value="${esc(f.name)}" placeholder="なーちゃん など"></div>
    <div class="sheetbtns"><button class="cancel">キャンセル</button><button class="save">${isNew?'追加':'保存'}</button></div>
    ${isNew?'':'<button class="btn danger" id="f_del" style="margin-top:12px;">この人を削除</button>'}`);
  let curImg=f.img;
  document.getElementById('fPickImg').onclick=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.onchange=()=>{const file=inp.files[0];if(!file)return;const fr=new FileReader();fr.onload=()=>{const im=new Image();im.onload=()=>{const side=Math.min(im.width,im.height);const sx=(im.width-side)/2,sy=(im.height-side)/2;const c=document.createElement('canvas');c.width=c.height=200;c.getContext('2d').drawImage(im,sx,sy,side,side,0,0,200,200);curImg=c.toDataURL('image/jpeg',0.82);document.getElementById('fAvatarPrev').innerHTML=friendAvatar({...f,img:curImg},96);haptic();};im.src=fr.result;};fr.readAsDataURL(file);};inp.click();};
  sheet.querySelector('.cancel').onclick=closeModal;
  sheet.querySelector('.save').onclick=()=>{f.name=val('f_name')||'名前なし';f.img=curImg;if(!state.friends)state.friends=[];if(isNew)state.friends.push(f);else{const i=state.friends.findIndex(x=>x.id===f.id);if(i>=0)state.friends[i]=f;}save();haptic();closeModal();renderAsobi();toast('保存しました');};
  const del=document.getElementById('f_del');if(del)del.onclick=()=>{state.friends=state.friends.filter(x=>x.id!==f.id);(state.plans||[]).forEach(p=>{if(Array.isArray(p.friendIds))p.friendIds=p.friendIds.filter(id=>id!==f.id);});save();haptic();closeModal();renderAsobi();toast('削除しました');};
}

function renderAsobi(){
  renderFriendStrip();
  const plans=(state.plans||[]).slice();
  const pending=plans.filter(p=>!p.done);
  const total=pending.reduce((s,p)=>s+(+p.cost||0),0);
  countUp(document.getElementById('asobiTotal'),total,v=>'<span class="yen">¥</span>'+NUM(v));
  document.getElementById('asobiSub').textContent=pending.length?`予定 ${pending.length}件ぶんの用意が必要`:'予定を追加してみよう';
  const host=document.getElementById('planList');host.innerHTML='';
  if(!plans.length){host.innerHTML='<div class="empty" style="padding:40px 0;">まだ予定がありません<br>右下の＋から追加しよう</div>';return;}
  plans.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return (a.date||'9999')<(b.date||'9999')?-1:1;});
  plans.forEach(p=>{
    const dd=p.date?new Date(p.date+'T12:00:00'):null;
    const row=document.createElement('div');row.className='plan'+(p.done?' done':'');
    const fids=(p.friendIds||[]).map(id=>friendById(id)).filter(Boolean);
    let faces='';if(fids.length){faces='<div class="pfaces">'+fids.slice(0,4).map(f=>friendAvatar(f,24)).join('')+(fids.length>4?`<span class="pmore">+${fids.length-4}</span>`:'')+'</div>';}
    const meta=[];const whoName=fids.length?fids.map(f=>f.name).join('・'):(p.who||'');if(whoName)meta.push(`<span>${esc(whoName)}</span>`);if(p.where)meta.push(`<span>📍 ${esc(p.where)}</span>`);
    row.innerHTML=`
      <div class="pd">${dd?`<div class="mo">${dd.getMonth()+1}月</div><div class="dy">${dd.getDate()}</div>`:'<div class="dy">?</div>'}</div>
      <div class="pi"><div class="pt">${esc(p.title||'予定')}</div><div class="pm">${meta.join('')||'<span style="opacity:.5">詳細なし</span>'}</div>${faces}</div>
      <div class="pr"><div class="pv">${YEN(p.cost||0)}</div><div class="pchk">${p.done?'✓':''}</div></div>`;
    row.querySelector('.pi').onclick=()=>openPlan(p);
    row.querySelector('.pd').onclick=()=>openPlan(p);
    row.querySelector('.pv').onclick=()=>openPlan(p);
    row.querySelector('.pchk').onclick=e=>{e.stopPropagation();p.done=!p.done;save();haptic();renderAsobi();toast(p.done?'完了にした！':'戻した');};
    host.appendChild(row);});
}
function openPlan(item){
  const isNew=!item;const p=item?{...item}:{id:uid(),title:'',who:'',where:'',date:todayStr(),cost:0,done:false,friendIds:[]};if(!p.friendIds)p.friendIds=[];
  openSheet(`<h3>${isNew?'遊びの予定を追加':'予定を編集'}</h3>
    <div class="field"><label>なにをする？</label><input id="p_title" value="${esc(p.title)}" placeholder="ライブ・飲み会・旅行 など"></div>
    <div class="field"><label>誰と？</label><div class="fselect" id="fSelect"></div></div>
    <div class="field"><label>どこで？</label><input id="p_where" value="${esc(p.where||'')}" placeholder="大阪・自宅 など"></div>
    <div class="field"><label>いつ？</label><input id="p_date" type="date" value="${p.date||''}"></div>
    <div class="field"><label>用意しておく金額（バッファ込み）</label><input id="p_cost" inputmode="text" value="${p.cost||''}" placeholder="例: 15000 や 8000+5000"></div>
    <div class="calceq" id="pCostEq" style="text-align:left;margin:-8px 4px 8px;"></div>
    <div class="sheetbtns"><button class="cancel">キャンセル</button><button class="save">${isNew?'追加':'保存'}</button></div>
    ${isNew?'':'<button class="btn danger" id="p_del" style="margin-top:12px;">この予定を削除</button>'}`);
  // フレンド選択チップ
  (function(){const fs=document.getElementById('fSelect');if(!fs)return;
    const friends=state.friends||[];
    if(!friends.length){fs.innerHTML='<div class="fsnone">先に遊びタブで「＋追加」から遊ぶ人を登録できます。<br>いまはメモとして入力：</div><input id="p_who" value="'+esc(p.who||'')+'" placeholder="友達・恋人 など" style="width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r-sm);padding:13px;font-size:16px;font-family:inherit;font-weight:600;margin-top:8px;">';return;}
    fs.innerHTML=friends.map(f=>`<div class="fsel ${p.friendIds.includes(f.id)?'on':''}" data-fid="${f.id}">${friendAvatar(f,40)}<span>${esc(f.name)}</span></div>`).join('');
    fs.querySelectorAll('[data-fid]').forEach(el=>el.onclick=()=>{const id=el.dataset.fid;if(p.friendIds.includes(id))p.friendIds=p.friendIds.filter(x=>x!==id);else p.friendIds.push(id);el.classList.toggle('on');haptic();});
  })();
  const costInput=document.getElementById('p_cost');
  const upd=()=>{const eq=document.getElementById('pCostEq');const raw=costInput.value;if(/[+\-*/×÷]/.test(raw)){const v=evalAmount(raw);eq.innerHTML=isNaN(v)?'':'= <b>'+YEN(v)+'</b>';}else eq.innerHTML='';};
  costInput.oninput=upd;upd();
  sheet.querySelector('.cancel').onclick=closeModal;
  sheet.querySelector('.save').onclick=()=>{
    p.title=val('p_title')||'予定';const whoEl=document.getElementById('p_who');if(whoEl)p.who=whoEl.value.trim();p.where=val('p_where');p.date=val('p_date')||todayStr();
    const c=evalAmount(val('p_cost'));p.cost=isNaN(c)?0:c;
    if(!state.plans)state.plans=[];
    if(isNew)state.plans.push(p);else{const i=state.plans.findIndex(x=>x.id===p.id);if(i>=0)state.plans[i]=p;}
    save();haptic();closeModal();renderAsobi();toast('保存しました');};
  const del=document.getElementById('p_del');if(del)del.onclick=()=>{state.plans=state.plans.filter(x=>x.id!==p.id);save();haptic();closeModal();renderAsobi();toast('削除しました');};
}

/* ===== TODO ===== */
function renderTodo(){
  const host=document.getElementById('todoList');host.innerHTML='';
  const todos=(state.todos||[]).slice().sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return 0;});
  if(!todos.length){host.innerHTML='<div class="empty" style="padding:40px 0;">やることはありません<br>上の欄から追加しよう</div>';return;}
  todos.forEach(td=>{const row=document.createElement('div');row.className='todoitem'+(td.done?' done':'');
    row.innerHTML=`<div class="todock ${td.done?'on':''}">${td.done?'✓':''}</div><div class="tt">${esc(td.text)}</div><button class="iconbtn">🗑</button>`;
    row.querySelector('.todock').onclick=()=>{td.done=!td.done;save();haptic();renderTodo();};
    row.querySelector('.iconbtn').onclick=()=>{state.todos=state.todos.filter(x=>x.id!==td.id);save();haptic();renderTodo();};
    host.appendChild(row);});
}
function addTodo(){const inp=document.getElementById('todoInput');const t=inp.value.trim();if(!t)return;if(!state.todos)state.todos=[];state.todos.unshift({id:uid(),text:t,done:false});inp.value='';save();haptic();renderTodo();}

/* ===== アカウント ===== */
function renderAcct(){
  const host=document.getElementById('acctList');host.innerHTML='';
  if(!(state.accounts||[]).length){host.innerHTML='<div class="empty" style="padding:40px 0;">アカウントはまだありません<br>下のボタンから追加できます</div>';return;}
  state.accounts.forEach(a=>{const row=document.createElement('div');row.className='aslot';const masked='••••••••';
    row.innerHTML=`<div class="athumb">${esc((a.service||'?').slice(0,1))}</div>
      <div class="am"><div class="at">${esc(a.service||'(名称なし)')}</div><div class="ac">${a.id?esc(a.id):'ID未設定'}　<span class="pwmask" data-pw>${a.pw?masked:''}</span></div></div>
      <div class="aa"></div>`;
    const aa=row.querySelector('.aa');
    if(a.pw){const eye=document.createElement('button');eye.className='iconbtn';eye.textContent='👁';eye.onclick=()=>{const el=row.querySelector('[data-pw]');el.textContent=el.textContent===masked?a.pw:masked;};aa.appendChild(eye);}
    const e=document.createElement('button');e.className='iconbtn';e.textContent='✎';e.onclick=()=>openAcct(a);aa.appendChild(e);
    host.appendChild(row);});
}
function openAcct(item){
  const isNew=!item;const a=item?{...item}:{id2:uid(),service:'',id:'',pw:'',memo:''};
  openSheet(`<h3>${isNew?'アカウントを追加':'アカウントを編集'}</h3>
    <div class="field"><label>サービス名</label><input id="a_s" value="${esc(a.service)}" placeholder="Netflix・銀行 など"></div>
    <div class="field"><label>ID / メール</label><input id="a_i" value="${esc(a.id||'')}" autocomplete="off" autocapitalize="off"></div>
    <div class="field"><label>パスワード</label><input id="a_p" value="${esc(a.pw||'')}" autocomplete="off" autocapitalize="off"></div>
    <div class="field"><label>メモ（任意）</label><input id="a_m" value="${esc(a.memo||'')}"></div>
    <div class="sheetbtns"><button class="cancel">キャンセル</button><button class="save">${isNew?'追加':'保存'}</button></div>
    ${isNew?'':'<button class="btn danger" id="a_del" style="margin-top:12px;">削除</button>'}`);
  sheet.querySelector('.cancel').onclick=closeModal;
  sheet.querySelector('.save').onclick=()=>{a.service=val('a_s')||'(名称なし)';a.id=val('a_i');a.pw=val('a_p');a.memo=val('a_m');if(!state.accounts)state.accounts=[];if(isNew)state.accounts.push(a);else{const i=state.accounts.findIndex(x=>x.id2===a.id2);if(i>=0)state.accounts[i]=a;}save();haptic();closeModal();renderAcct();toast('保存しました');};
  const del=document.getElementById('a_del');if(del)del.onclick=()=>{state.accounts=state.accounts.filter(x=>x.id2!==a.id2);save();haptic();closeModal();renderAcct();toast('削除しました');};
}

/* ===== ナビ・FAB ===== */
const VIEW_TITLE={shuushi:'くらしサポート',shukei:'集計',asobi:'あそびの予定',todo:'やること',acct:'アカウント'};
function switchView(v){
  document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('active',x.dataset.view===v));
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('view-'+v);if(el)el.classList.add('active');
  document.getElementById('brandTitle').textContent=VIEW_TITLE[v]||'くらしサポート';
  document.getElementById('fab').style.display=(v==='shuushi'||v==='asobi')?'flex':'none';
  window.scrollTo(0,0);
  if(v==='shuushi')renderShuushi();if(v==='shukei'){skMonth=curMonth;renderShukei();}if(v==='asobi')renderAsobi();if(v==='todo')renderTodo();if(v==='acct')renderAcct();
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{switchView(b.dataset.view);haptic();});
document.getElementById('fab').onclick=()=>{const active=document.querySelector('.view.active').id;haptic();if(active==='view-asobi')openPlan();else openTx();};
document.getElementById('gearBtn').onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));document.getElementById('view-set').classList.add('active');document.getElementById('brandTitle').textContent='設定';document.getElementById('fab').style.display='none';window.scrollTo(0,0);haptic();};
document.getElementById('skPrevM').onclick=()=>{skMonth=addMonth(skMonth||curMonth,-1);haptic();renderShukei();};
document.getElementById('skNextM').onclick=()=>{skMonth=addMonth(skMonth||curMonth,1);haptic();renderShukei();};
document.getElementById('todoAddBtn').onclick=addTodo;
document.getElementById('todoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});
document.getElementById('acctAddBtn').onclick=()=>openAcct();

/* ===== export/import/reset ===== */
document.getElementById('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`okane-backup-${todayMonth()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);toast('書き出しました');};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);migrate();save();switchView('shuushi');toast('復元しました');}catch(err){toast('読み込めませんでした');}};r.readAsText(f);};
document.getElementById('resetBtn').onclick=()=>{openSheet(`<h3>初期化の確認</h3><p style="color:var(--ink-dim);text-align:center;margin:0 0 20px;line-height:1.7;">すべてのデータを消して<br>最初からにします。よろしいですか？</p><div class="sheetbtns"><button class="cancel">やめる</button><button class="save" style="background:var(--red);" id="rY">初期化する</button></div>`);sheet.querySelector('.cancel').onclick=closeModal;document.getElementById('rY').onclick=()=>{state=seed();migrate();save();curMonth=todayMonth();selDate=todayStr();closeModal();switchView('shuushi');toast('初期化しました');};};

/* ===== migrate & boot ===== */
function migrate(){if(!state.tx)state.tx={};if(!state.plans)state.plans=[];if(!state.todos)state.todos=[];if(!state.accounts)state.accounts=[];if(!state.friends)state.friends=[];}
(async function(){try{await openDB();state=await load();}catch(e){state=null;}if(!state)state=seed();migrate();save();switchView('shuushi');})();
</script>
